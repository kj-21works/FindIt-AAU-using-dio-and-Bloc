name: findit_aau
description: FindIt AAU – Campus Lost & Found Platform for Addis Ababa University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1

  # UI Enhancements
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
